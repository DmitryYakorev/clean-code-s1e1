<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet"
          href="style.css"
          media="screen"
          charset="utf-8">
  </head>
<body class="body">
  <header class="wrapper">
    <img src="./eisenhower-matrix.jpg" alt="pic1">
    <a class="mor-inf" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
  </header>
  <div class="centered-main">
      <label for="new-task">Add Item</label>
      <div class="task-row-wrapper">
        <input id="new-task" class="task" type="text">
        <button class="btn1">Add</button>
      </div>
    <h3 class="h3">Todo</h3>
    <ul id="incompleteTasks" class="ul">
      <li class="li">
        <input type="checkbox">
        <label class="task incomplete-task-message">Pay Bills</label>
        <input type="text incomplete-task-new-message">
        <button class="edit">Edit</button>
        <button class="delete">
          <img src="./remove.svg" alt="pic2">
        </button>
      </li>
      <li class="editMode li">
        <input type="checkbox">
        <label class="task incomplete-task-message">Go Shopping</label>
        <input type="text" value="Go Shopping" class="task incomplete-task-new-message">
        <button class="edit">Save</button>
        <button class="delete">
          <img src="./remove.svg" alt="pic2">
        </button>
      </li>
    </ul>
    <h3 class="h3">Completed</h3> 
    <ul id="completed-tasks ul">
      <li class="li">
        <input type="checkbox" checked>
        <label class="completed-task-message task">See the Doctor</label>
        <input  type="text" class="task completed-task-new-message">
        <button class="edit">Edit</button>
        <button class="delete">
          <img src="./remove.svg" alt="pic2">
        </button>
      </li>
    </ul>
  </div>
  <script type="text/javascript" src="app.js"></script>
</body>
</html>
